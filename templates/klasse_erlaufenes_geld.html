<!DOCTYPE html>
<html>
<head>
    <title>Erlaufenes Geld – Klasse {{ klasse }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <h1 class="mb-4 text-center">Erlaufenes Geld – Klasse {{ klasse }}</h1>

    <div class="card shadow p-4">

        <table class="table table-hover">
            <thead class="table-primary">
                <tr>
                    <th>Schüler</th>
                    <th>Erlaufenes Geld (€)</th>
                </tr>
            </thead>

            <tbody>
            {% for id, name, geld in geld_liste %}
                <tr>
                    <td>{{ name }}</td>
                    <td><strong>{{ geld }}</strong></td>
                </tr>
            {% endfor %}
            </tbody>
        </table>

        <div><a>Gesamt Geld: </a><b>{{ total_geld }}</b><a> €</a></div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
