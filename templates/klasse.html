<!DOCTYPE html>
<html>
<head>
    <title>Spenden – Klasse {{ klasse }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <h1 class="mb-4 text-center">Spenden für Klasse {{ klasse }}</h1>

    <form action="/klasse/{{ klasse }}/spenden" method="POST" class="card shadow p-4">

        <table class="table table-striped">
            <thead class="table-dark">
                <tr>
                    <th>Schüler</th>
                    <th>Spende (€)</th>
                </tr>
            </thead>

            <tbody>
            {% for id, name in students %}
                <tr>
                    <td>{{ name }}</td>
                    <td>
                        <input type="number" class="form-control" name="spende_{{ id }}" min="0" step="0.01">
                    </td>
                </tr>
            {% endfor %}
            </tbody>
        </table>

        <button type="submit" class="btn btn-success btn-lg w-100 mt-3">
            Spenden speichern
        </button>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
