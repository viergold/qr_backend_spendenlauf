<!DOCTYPE html>
<html>
<head>
    <title>Spenden – Klasse {{ klasse }}</title>
</head>
<body>

<h1>Spenden für Klasse {{ klasse }}</h1>

<form action="/klasse/{{ klasse }}/spenden" method="POST">

    <table border="1" cellpadding="8">
        <tr>
            <th>Schüler</th>
            <th>Spende (€)</th>
        </tr>

        {% for id, name in students %}
        <tr>
            <td>{{ name }}</td>
            <td>
                <input type="number" name="spende_{{ id }}" min="0">
            </td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <button type="submit">Spenden speichern</button>

</form>

</body>
</html>
