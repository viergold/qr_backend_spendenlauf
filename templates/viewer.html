<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Stream Viewer</title>
  <style>
    html,body { height:100%; margin:0; background:#000; display:flex; align-items:center; justify-content:center; }
    img { max-width:100%; max-height:100%; border:0; }
    #info { position:fixed; top:8px; left:8px; color:#fff; background:rgba(0,0,0,0.5); padding:6px 10px; border-radius:6px; font-family:Arial; font-size:14px; }
  </style>
</head>
<body>
  <div id="info">Stream: <span id="camName"></span></div>
  <img id="streamImg" alt="Live Stream">
  <script>
    const cameraId = "{{ camera_id }}"; // wird vom Flask-Template gesetzt
    document.getElementById("camName").textContent = cameraId;

    const protocol = (location.protocol === "https:") ? "https:" : "http:";
    const host = window.location.hostname && window.location.hostname !== "" ? window.location.hostname : "localhost";
    const port = 5001;
    const streamUrl = `${protocol}//${host}:${port}/stream/${cameraId}`;

    const img = document.getElementById("streamImg");
    img.src = streamUrl;

    img.addEventListener("error", () => {
      document.getElementById("info").textContent = "Stream nicht erreichbar";
    });
  </script>
</body>
</html>
