<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<title>QR Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    background: #111;
    color: white;
    font-family: Arial;
    text-align: center;
}

#reader {
    width: 95%;
    max-width: 900px;
    margin: auto;
    position: relative;
}

#scanBox {
    position: absolute;
    border: 4px solid #00ff88;
    width: 200px;
    height: 200px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    border-radius: 10px;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { opacity: 1 }
    50% { opacity: 0.4 }
    100% { opacity: 1 }
}

#status {
    margin-top: 20px;
    font-size: 22px;
    color: #00ff88;
}
</style>

</head>

<body>

<h1>🚀QR Scanner</h1>

<div id="reader">
    <div id="scanBox"></div>
</div>

<div id="status">Scanner startet...</div>

<script>
/* ---------------------------------------------------
   SCANNER-ID ABFRAGEN
--------------------------------------------------- */
const CLIENT_ID = parseInt(prompt("Bitte Scanner-ID eingeben:"));
if (!CLIENT_ID || isNaN(CLIENT_ID)) {
    document.getElementById("status").innerHTML = "❌ Ungültige Scanner-ID";
}

/* ---------------------------------------------------
   SCAN-COOLDOWN & HISTORY
--------------------------------------------------- */
let scanHistory = {};
let cooldown = 60000; // 60 Sekunden

setInterval(() => {
    const now = Date.now();
    for (let code in scanHistory) {
        if (now - scanHistory[code] > cooldown) {
            delete scanHistory[code];
        }
    }
}, 5000);

/* ---------------------------------------------------
   QR SENDEN + NAME ANZEIGEN
--------------------------------------------------- */
function sendQR(text) {
    fetch("/qr", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            qr: text,
            scanner: CLIENT_ID
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.status === "ok") {
            document.getElementById("status").innerHTML =
                "👤 <b>" + data.qr + "</b> wurde erkannt";
        } else {
            document.getElementById("status").innerHTML =
                "❌ Fehler beim Abrufen des Namens";
        }
    })
    .catch(() => {
        document.getElementById("status").innerHTML =
            "❌ Server nicht erreichbar";
    });
}

/* ---------------------------------------------------
   PING AN SERVER SENDEN
--------------------------------------------------- */
function sendPing() {
    if (!CLIENT_ID) return;

    fetch(`/ping?id=${CLIENT_ID}`)
        .then(res => res.json())
        .then(data => {
            if (data.status !== "ok") {
                console.warn("Ping-Fehler:", data);
            }
        })
        .catch(() => {
            console.warn("Ping fehlgeschlagen");
        });
}

/* Alle 5 Sekunden pingen */
setInterval(sendPing, 1000);



/* ---------------------------------------------------
   QR-SCAN HANDLING
--------------------------------------------------- */
function onScanSuccess(decodedText) {
    let now = Date.now();

    if (scanHistory[decodedText] && now - scanHistory[decodedText] < cooldown) {
        return;
    }

    scanHistory[decodedText] = now;

    document.getElementById("status").innerHTML =
        "📡 QR erkannt – sende Daten...";

    sendQR(decodedText);
}

/* ---------------------------------------------------
   SCANNER STARTEN
--------------------------------------------------- */
async function startScanner() {
    const qrScanner = new Html5Qrcode("reader");

    const cameras = await Html5Qrcode.getCameras();
    if (!cameras.length) {
        alert("Keine Kamera gefunden");
        return;
    }

    let backCam = cameras.find(cam =>
        cam.label.toLowerCase().includes("back") ||
        cam.label.toLowerCase().includes("rear")
    );

    if (!backCam) backCam = cameras[cameras.length - 1];

    await qrScanner.start(
        backCam.id,
        {
            fps: 30,
            aspectRatio: 1.777,
            disableFlip: false,
            experimentalFeatures: {
                useBarCodeDetectorIfSupported: true
            },
            videoConstraints: {
                facingMode: "environment",
                width: { ideal: 1920 },
                height: { ideal: 1080 }
            }
        },
        onScanSuccess
    );
}

startScanner();

/* ---------------------------------------------------
   PAGE SWITCHING
--------------------------------------------------- */
function getClientId() {
    const match = document.cookie.match(/client_id=([^;]+)/);
    return match ? match[1] : null;
}

const clientId = getClientId();
const currentPage = window.location.pathname.replace("/", "");

async function checkNextPage() {
    if (!clientId) return;

    const res = await fetch(`/api/next_page/${clientId}`);
    const data = await res.json();

    if (!data.next_page) return;

    if (data.next_page !== currentPage) {
        window.location.href = `/${data.next_page}`;
    }
}

setInterval(checkNextPage, 1000);
</script>

</body>
</html>
