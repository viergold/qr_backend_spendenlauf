<!DOCTYPE html>
<html>
<head>
    <title>Klassenübersicht</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="container mt-3">
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}
<div class="container py-5">
    <h1 class="mb-4 text-center">Klassenübersicht</h1>

    <div class="list-group shadow">
        {% for k in klassen %}
        <a href="/klasse/{{ k }}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
            <span>Klasse {{ k }}</span>
            <span class="badge bg-primary rounded-pill">Spenden</span>
        </a>

        <a href="/klasse/{{ k }}/erlaufenes_geld" class="list-group-item list-group-item-action text-secondary">
            ➜ Erlaufenes Geld anzeigen
        </a>
        {% endfor %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
